# ============================================================
# AccessRoute AI推論サーバー - 本番用 Docker Compose
# ============================================================

services:
  ai-server:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: accessroute-ai-server
    ports:
      - "8000:8000"
    environment:
      # モデル設定
      - MODEL_NAME=cyberagent/calm3-22b-chat
      - MODEL_BACKEND=vllm
      - QUANTIZATION=gptq
      # 生成パラメータ
      - MAX_TOKENS=1024
      - TEMPERATURE=0.7
      - TOP_P=0.9
      - REPETITION_PENALTY=1.1
      # GPU設定
      - TENSOR_PARALLEL_SIZE=1
      - GPU_MEMORY_UTILIZATION=0.9
      # サーバー設定
      - MAX_CONCURRENT_REQUESTS=4
      - LOG_LEVEL=INFO
      # モニタリング
      - MONITOR_LOG_FILE=/app/logs/monitor.log
      - MONITOR_INTERVAL=30
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
        limits:
          cpus: "8"
          memory: 32G
    volumes:
      # モデルキャッシュの永続化
      - huggingface-cache:/root/.cache/huggingface
      # ログ出力
      - ai-logs:/app/logs
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    networks:
      - ai-network

networks:
  ai-network:
    driver: bridge

volumes:
  huggingface-cache:
  ai-logs:
