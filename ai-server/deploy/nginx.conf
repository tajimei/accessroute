# ============================================================
# AccessRoute AI推論サーバー - Nginx リバースプロキシ設定
# SSL終端（Let's Encrypt）、レート制限、SSE対応
# ============================================================

# レート制限ゾーン定義: 1IPあたり10リクエスト/秒
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

# アップストリーム定義
upstream ai_server {
    server 127.0.0.1:8000;
    keepalive 32;
}

# HTTP → HTTPS リダイレクト
server {
    listen 80;
    listen [::]:80;
    server_name ai.accessroute.example.com;

    # Let's Encrypt 認証用
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS サーバー
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ai.accessroute.example.com;

    # --- SSL設定（Let's Encrypt） ---
    ssl_certificate /etc/letsencrypt/live/ai.accessroute.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ai.accessroute.example.com/privkey.pem;

    # SSL セキュリティ設定
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    # HSTS（1年間）
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # セキュリティヘッダ
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;

    # リクエストボディサイズ制限
    client_max_body_size 1m;

    # --- ヘルスチェック（レート制限なし） ---
    location /health {
        proxy_pass http://ai_server;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- メトリクス（内部ネットワークのみ許可） ---
    location /metrics {
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;

        proxy_pass http://ai_server;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # --- APIエンドポイント（レート制限あり） ---
    location /v1/ {
        # レート制限: 10req/s、バースト20まで許可（遅延なし5件）
        limit_req zone=api_limit burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://ai_server;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE対応: バッファリング無効化
        proxy_buffering off;
        proxy_cache off;

        # SSE用ヘッダ
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding off;

        # タイムアウト設定（AI推論は時間がかかるため長めに設定）
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # その他のリクエストは拒否
    location / {
        return 404;
    }
}
