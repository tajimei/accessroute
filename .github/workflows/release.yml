# リリースワークフロー
# タグプッシュ時に全テスト実行 → ビルド → デプロイを行う
name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

env:
  XCODE_VERSION: latest-stable

jobs:
  # ============================
  # 1. Backend テスト
  # ============================
  backend-test:
    name: Backend テスト
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/functions

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Node.js セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/functions/package-lock.json

      - name: 依存パッケージのインストール
        run: npm ci

      - name: Lint チェック
        run: npm run lint

      - name: テスト実行
        run: npm test

  # ============================
  # 2. AI Server テスト
  # ============================
  ai-server-test:
    name: AI Server テスト
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-server

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 依存パッケージのインストール
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint チェック
        run: ruff check .

      - name: フォーマットチェック
        run: ruff format --check .

      - name: テスト実行
        run: pytest -v --cov=. --cov-report=xml:coverage.xml

      - name: AI応答品質ベンチマーク (モックモード)
        run: python benchmark_quality.py --mode mock --output benchmark-results.json --ci

  # ============================
  # 3. セキュリティ・パフォーマンステスト
  # ============================
  security-performance-test:
    name: セキュリティ・パフォーマンステスト
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 依存パッケージのインストール
        run: |
          python -m pip install --upgrade pip
          pip install -e "ai-server/.[dev]"
          pip install pytest

      - name: セキュリティテスト実行
        run: pytest tests/security/ -v --junitxml=security-results.xml

      - name: パフォーマンステスト実行
        run: pytest tests/performance/ -v --junitxml=performance-results.xml

      - name: テスト結果をアーティファクトとして保存
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-performance-results
          path: |
            security-results.xml
            performance-results.xml
          retention-days: 30

  # ============================
  # 4. iOS ビルド・テスト
  # ============================
  ios-build:
    name: iOS ビルド・テスト
    runs-on: macos-latest
    defaults:
      run:
        working-directory: ios

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Xcode バージョン選択
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: SwiftLint
        run: |
          brew install swiftlint
          swiftlint lint --strict

      - name: ビルド
        run: |
          xcodebuild build \
            -project AccessRoute.xcodeproj \
            -scheme AccessRoute \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO

      - name: テスト実行
        run: |
          xcodebuild test \
            -project AccessRoute.xcodeproj \
            -scheme AccessRoute \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO

  # ============================
  # 5. TestFlight 配布
  # ============================
  testflight-deploy:
    name: TestFlight 配布
    needs: [backend-test, ai-server-test, security-performance-test, ios-build]
    runs-on: macos-latest
    defaults:
      run:
        working-directory: ios

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Xcode バージョン選択
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Ruby セットアップ
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true
          working-directory: ios

      - name: Fastlane インストール
        run: |
          gem install fastlane
          gem install fastlane-plugin-match

      - name: App Store Connect APIキー設定
        env:
          APP_STORE_CONNECT_API_KEY_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          APP_STORE_CONNECT_API_KEY_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
        run: echo "App Store Connect API キーが設定されました"

      - name: 証明書・プロファイルの復号
        env:
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_TOKEN }}
        run: fastlane match appstore --readonly

      - name: TestFlight ビルド・アップロード
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          TEAM_ID: ${{ secrets.TEAM_ID }}
          ITC_TEAM_ID: ${{ secrets.ITC_TEAM_ID }}
          APP_STORE_CONNECT_APP_ID: ${{ secrets.ASC_APP_ID }}
          BUILD_NUMBER: ${{ github.run_number }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: fastlane beta

      - name: IPAファイルをアーティファクトとして保存
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: accessroute-ipa
          path: ios/fastlane/builds/AccessRoute.ipa
          retention-days: 90

  # ============================
  # 6. GitHub Release 作成
  # ============================
  create-release:
    name: GitHub Release 作成
    needs: [testflight-deploy]
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: リリースノート生成
        id: release_notes
        run: |
          # 前のタグからの変更ログを生成
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            CHANGELOG=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s (%h)" --no-merges)
          else
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" --no-merges -20)
          fi
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: GitHub Release 作成
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "AccessRoute ${{ github.ref_name }}"
          body: |
            ## AccessRoute ${{ github.ref_name }}

            ### 変更内容
            ${{ steps.release_notes.outputs.changelog }}

            ### テスト結果
            - Backend テスト: 通過
            - AI Server テスト: 通過
            - セキュリティテスト: 通過
            - パフォーマンステスト: 通過
            - iOS ビルド・テスト: 通過

            ### TestFlight
            TestFlight にビルドがアップロードされています。
          draft: false
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}

      - name: Slack リリース通知
        if: success()
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "AccessRoute ${{ github.ref_name }} がリリースされました",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ":rocket: *AccessRoute ${{ github.ref_name }}* リリース完了\n*TestFlight:* ビルドアップロード済み\n<${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ github.ref_name }}|リリースページを確認>"
                  }
                }
              ]
            }
