# iOS アプリ CI パイプライン
name: iOS CI

on:
  push:
    branches: [main, develop, "feature/**", "fix/**"]
    paths:
      - "ios/**"
      - ".github/workflows/ios.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "ios/**"
      - ".github/workflows/ios.yml"

jobs:
  ios-ci:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: ios
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v5

      # YOLPアプリケーションIDを環境変数として設定
      - name: YOLP App ID を環境変数に設定
        run: echo "YOLP_APP_ID=${{ secrets.YOLP_APP_ID }}" >> $GITHUB_ENV

      - name: Xcode バージョン選択
        run: sudo xcode-select -s "$(ls -d /Applications/Xcode*.app | sort -V | tail -1)/Contents/Developer"

      - name: SwiftLint インストール・実行
        run: |
          brew install swiftlint
          swiftlint lint --strict

      - name: ビルド
        run: |
          xcodebuild build \
            -project AccessRoute.xcodeproj \
            -scheme AccessRoute \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO

      - name: テスト実行
        run: |
          xcodebuild test \
            -project AccessRoute.xcodeproj \
            -scheme AccessRoute \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO
