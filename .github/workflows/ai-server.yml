# AI推論サーバー CI パイプライン
name: AI Server CI

on:
  push:
    branches: [main, develop, "feature/**", "fix/**"]
    paths:
      - "ai-server/**"
  pull_request:
    branches: [main, develop]
    paths:
      - "ai-server/**"

jobs:
  ai-server-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-server

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 依存パッケージのインストール
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint チェック (ruff)
        run: ruff check .

      - name: フォーマットチェック (ruff)
        run: ruff format --check .

      - name: 型チェック (mypy)
        run: mypy .

      - name: テスト実行 (pytest)
        run: pytest -v --cov=. --cov-report=term-missing --cov-report=html:htmlcov --cov-report=xml:coverage.xml --junitxml=junit-results.xml

      - name: AI応答品質ベンチマーク (モックモード)
        run: python benchmark_quality.py --mode mock --output benchmark-results.json --ci

      - name: カバレッジレポートをアーティファクトとして保存
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-server-coverage-report
          path: |
            ai-server/htmlcov/
            ai-server/coverage.xml
          retention-days: 30

      - name: ベンチマーク結果をアーティファクトとして保存
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-benchmark-results
          path: ai-server/benchmark-results.json
          retention-days: 30

      - name: テスト結果サマリーを投稿
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: ai-server/junit-results.xml

      - name: テスト失敗時のSlack通知
        if: failure()
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "AI Server CI テスト失敗",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ":x: *AI Server CI テスト失敗*\n*リポジトリ:* ${{ github.repository }}\n*ブランチ:* ${{ github.ref_name }}\n*コミット:* ${{ github.sha }}\n*実行者:* ${{ github.actor }}\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|詳細を確認>"
                  }
                }
              ]
            }
