# SwiftLint 設定
line_length:
  warning: 150
  error: 200

type_body_length:
  warning: 500
  error: 800

file_length:
  warning: 1000
  error: 2000

function_body_length:
  warning: 80
  error: 150

cyclomatic_complexity:
  warning: 15
  error: 20

identifier_name:
  min_length:
    warning: 2
    error: 1
  max_length:
    warning: 60
    error: 80
  excluded:
    - id
    - x
    - y
    - m
  allowed_symbols:
    - _

nesting:
  type_level: 2

disabled_rules:
  - trailing_whitespace
  - comma
  - colon
  - trailing_comma
  - opening_brace
  - closing_brace
  - todo
  - for_where
  - superfluous_disable_command
  - invalid_swiftlint_command

excluded:
  - Pods
  - .build
